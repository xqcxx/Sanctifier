version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      rust-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "cargo"
    directory: "/contracts/bridge"
    schedule:
      interval: "daily"
  - package-ecosystem: "cargo"
    directory: "/contracts/oracle"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
