name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Continuous Integration
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Z3
        uses: z3prover/setup-z3@v1
        with:
          z3-version: 4.12.2

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: |
          cargo clippy -p sanctifier-core --all-targets --all-features -- -D warnings
          cd tooling/sanctifier-cli && cargo clippy --all-targets -- -D warnings

      - name: Build All (Debug)
        run: |
          cargo build -p sanctifier-core --all-features
          cd tooling/sanctifier-cli && cargo build

      - name: Run All Tests
        run: |
          cargo test -p sanctifier-core --all-features
          cargo test -p sanctifier-cli

      - name: Install tarpaulin (Linux only)
        if: runner.os == 'Linux'
        run: cargo install cargo-tarpaulin || true

      - name: Generate Coverage Report (Linux only)
        if: runner.os == 'Linux'
        run: cargo tarpaulin -p sanctifier-core --out Xml

      - name: Upload coverage to Codecov (Linux only)
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          fail_ci_if_error: false
          slug: HyperSafeD/Sanctifier

      - name: Build Release CLI
        run: cd tooling/sanctifier-cli && cargo build --release

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build WASM stub
        run: |
          mkdir -p tooling/sanctifier-wasm/pkg
          echo '{"name":"@sanctifier/wasm","version":"0.0.0","main":"index.js"}' > tooling/sanctifier-wasm/pkg/package.json
          echo 'module.exports = {};' > tooling/sanctifier-wasm/pkg/index.js

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run unit tests
        run: cd frontend && npm test

      - name: Generate coverage report
        run: cd frontend && npm run test:coverage
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  wasm:
    name: Build WASM Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            tooling/sanctifier-wasm/target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('tooling/sanctifier-wasm/Cargo.lock', 'tooling/sanctifier-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: |
          cd tooling/sanctifier-wasm
          wasm-pack build --target web --out-dir pkg --out-name sanctifier_wasm
          # Inject the npm package name expected by the frontend
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('pkg/package.json', 'utf8'));
            pkg.name = '@sanctifier/wasm';
            fs.writeFileSync('pkg/package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanctifier-wasm-pkg
          path: tooling/sanctifier-wasm/pkg/
          retention-days: 7
