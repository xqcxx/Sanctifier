[workspace]
members = [
    "tooling/sanctifier-cli",
    "tooling/sanctifier-core",
    "contracts/vulnerable-contract",
    "contracts/kani-poc",
]
resolver = "2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1

[patch.crates-io]
arbitrary = { git = "https://github.com/rust-fuzz/arbitrary", branch = "main" }
derive_arbitrary = { git = "https://github.com/rust-fuzz/arbitrary", branch = "main" }

